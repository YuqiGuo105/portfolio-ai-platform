name: E2E Tests

on:
  # Auto-run after agent-service is deployed (agent is the top of the stack)
  workflow_run:
    workflows: ["Deploy portfolio-agent-service"]
    types: [completed]

  # Allow manual trigger with URL overrides for local / staging testing
  workflow_dispatch:
    inputs:
      agent_url:
        description: "Agent service base URL (override vars.AGENT_SERVICE_URL)"
        required: false
        type: string
      gateway_url:
        description: "Gateway base URL (override vars.MCP_GATEWAY_BASE_URL)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write   # needed for WIF to fetch Cloud Run URLs dynamically

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION:     ${{ vars.GCP_REGION }}

jobs:
  e2e:
    # Only run when triggered by workflow_run if the deploy succeeded.
    # Manual dispatch always runs.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for scripts)
        uses: actions/checkout@v4

      # ── Resolve Cloud Run service URLs ────────────────────────────────────
      - name: Authenticate to Google Cloud
        if: github.event_name != 'workflow_dispatch' || (inputs.agent_url == '' && inputs.gateway_url == '')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        if: github.event_name != 'workflow_dispatch' || (inputs.agent_url == '' && inputs.gateway_url == '')
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve Cloud Run service URLs
        id: urls
        run: |
          if [ -n "${{ inputs.agent_url }}" ]; then
            AGENT_URL="${{ inputs.agent_url }}"
          elif [ -n "${{ vars.AGENT_SERVICE_URL }}" ]; then
            AGENT_URL="${{ vars.AGENT_SERVICE_URL }}"
          else
            AGENT_URL=$(gcloud run services describe portfolio-agent-service \
              --region="${REGION}" --project="${PROJECT_ID}" \
              --format='value(status.url)')
          fi

          if [ -n "${{ inputs.gateway_url }}" ]; then
            GATEWAY_URL="${{ inputs.gateway_url }}"
          elif [ -n "${{ vars.MCP_GATEWAY_BASE_URL }}" ]; then
            GATEWAY_URL="${{ vars.MCP_GATEWAY_BASE_URL }}"
          else
            GATEWAY_URL=$(gcloud run services describe portfolio-mcp-gateway \
              --region="${REGION}" --project="${PROJECT_ID}" \
              --format='value(status.url)')
          fi

          echo "agent_url=${AGENT_URL}"   >> "$GITHUB_OUTPUT"
          echo "gateway_url=${GATEWAY_URL}" >> "$GITHUB_OUTPUT"
          echo "Agent URL  : ${AGENT_URL}"
          echo "Gateway URL: ${GATEWAY_URL}"

      # ── Tier 1: Health endpoints ──────────────────────────────────────────
      - name: "T1 – Agent health"
        run: |
          URL="${{ steps.urls.outputs.agent_url }}/api/health"
          echo "GET ${URL}"
          HTTP=$(curl -s -o /tmp/agent-health.json -w "%{http_code}" "${URL}")
          echo "Status: ${HTTP}"
          cat /tmp/agent-health.json
          [ "${HTTP}" = "200" ] || (echo "Agent health FAILED (${HTTP})" && exit 1)

      - name: "T1 – Gateway health"
        run: |
          URL="${{ steps.urls.outputs.gateway_url }}/api/health"
          echo "GET ${URL}"
          HTTP=$(curl -s -o /tmp/gw-health.json -w "%{http_code}" "${URL}")
          echo "Status: ${HTTP}"
          cat /tmp/gw-health.json
          [ "${HTTP}" = "200" ] || (echo "Gateway health FAILED (${HTTP})" && exit 1)

      # ── Tier 2: Gateway tool catalog ─────────────────────────────────────
      - name: "T2 – Gateway tool catalog returns 19 tools"
        run: |
          URL="${{ steps.urls.outputs.gateway_url }}/api/tools"
          echo "GET ${URL}"
          HTTP=$(curl -s -o /tmp/tools.json -w "%{http_code}" "${URL}")
          echo "Status: ${HTTP}"
          [ "${HTTP}" = "200" ] || (echo "GET /api/tools FAILED (${HTTP})" && exit 1)

          TOOL_COUNT=$(python3 -c "import json; d=json.load(open('/tmp/tools.json')); print(len(d.get('tools', d) if isinstance(d, dict) else d))" 2>/dev/null || echo "0")
          echo "Tool count: ${TOOL_COUNT}"
          [ "${TOOL_COUNT}" = "19" ] || (echo "Expected 19 tools, got ${TOOL_COUNT}" && exit 1)

          echo "All 19 tools present:"
          python3 -c "
          import json
          d = json.load(open('/tmp/tools.json'))
          tools = d.get('tools', d) if isinstance(d, dict) else d
          for t in tools:
              name = t.get('name','?') if isinstance(t, dict) else str(t)
              print('  -', name)
          "

      # ── Tier 3: Agent intent API ─────────────────────────────────────────
      - name: "T3 – Agent /api/intent general-chat (no OpenAI key needed)"
        run: |
          URL="${{ steps.urls.outputs.agent_url }}/api/intent"
          echo "POST ${URL}"
          PAYLOAD='{"sessionId":"e2e-ci","userId":"ci","userEmail":"ci@yuqi.site","userRoles":"VIEWER","utterance":"hello"}'
          HTTP=$(curl -s -o /tmp/intent-chat.json -w "%{http_code}" \
            -X POST "${URL}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}")
          echo "Status: ${HTTP}"
          cat /tmp/intent-chat.json
          # 200 = handled (OK/GENERAL_CHAT/ASK); 503 = OpenAI not configured — both are acceptable
          # as long as it's not 404/500 due to wiring bugs
          [[ "${HTTP}" =~ ^(200|503)$ ]] || (echo "Intent endpoint returned unexpected status ${HTTP}" && exit 1)

      - name: "T3 – Validate response schema"
        run: |
          python3 - << 'PYEOF'
          import json, sys
          try:
              d = json.load(open('/tmp/intent-chat.json'))
          except Exception as e:
              print(f"FAIL: cannot parse response JSON: {e}")
              sys.exit(1)

          required_fields = ['type']
          missing = [f for f in required_fields if f not in d]
          if missing:
              print(f"FAIL: missing fields in response: {missing}")
              print("Response:", json.dumps(d, indent=2))
              sys.exit(1)

          allowed_types = {'OK', 'ASK', 'CONFIRMATION_REQUIRED', 'FORBIDDEN', 'GENERAL_CHAT', 'ERROR'}
          if d['type'] not in allowed_types:
              print(f"FAIL: unknown response type '{d['type']}'")
              sys.exit(1)

          print(f"PASS: response type={d['type']}")
          PYEOF

      # ── Upload evidence ───────────────────────────────────────────────────
      - name: Upload e2e artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-responses
          path: /tmp/*.json
          retention-days: 7

      # ── Summary ──────────────────────────────────────────────────────────
      - name: E2E summary
        if: always()
        run: |
          echo "## E2E Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ------- | --- |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent   | ${{ steps.urls.outputs.agent_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Gateway | ${{ steps.urls.outputs.gateway_url }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "| ---- | ------ |" >> "$GITHUB_STEP_SUMMARY"
          for f in /tmp/agent-health.json /tmp/gw-health.json /tmp/tools.json /tmp/intent-chat.json; do
            [ -f "$f" ] && echo "| ${f##*/} | $(cat $f | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK')" 2>/dev/null || echo "MISSING/INVALID") |" >> "$GITHUB_STEP_SUMMARY"
          done
