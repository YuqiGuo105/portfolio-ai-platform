name: Deploy portfolio-agent-service

on:
  # Auto-deploy when CI passes on main (green-gate)
  workflow_run:
    workflows: ["CI \u2013 Build & Test"]
    branches: [main]
    types: [completed]

  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag override (optional). Defaults to sha-<short-sha>."
        required: false
        type: string
  push:
    tags:
      - "agent-v*"

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID:        ${{ vars.GCP_PROJECT_ID }}
  REGION:            ${{ vars.GCP_REGION }}
  ARTIFACT_REPO:     ${{ vars.ARTIFACT_REPO }}
  IMAGE_NAME:        portfolio-agent-service
  SERVICE_NAME:      portfolio-agent-service
  KNOWLEDGE_SERVICE_NAME: ${{ vars.KNOWLEDGE_SERVICE_NAME || 'knowledge-service' }}
  WIF_PROVIDER:      ${{ vars.WIF_PROVIDER }}
  DEPLOYER_SA_EMAIL: ${{ vars.DEPLOYER_SA_EMAIL }}
  RUNTIME_SA_EMAIL:  ${{ vars.AGENT_RUNTIME_SA_EMAIL }}
  ALLOWED_ORIGINS:   ${{ vars.ALLOWED_ORIGINS }}
  CHAT_DAILY_BUDGET_USD: ${{ vars.PORTFOLIO_AGENT_DAILY_BUDGET_USD || '0.75' }}
  GEMINI_INTENT_MODEL: ${{ vars.GEMINI_INTENT_MODEL || 'gemini-2.5-flash-lite' }}
  SAFETY_MODEL: ${{ vars.SAFETY_MODEL || 'gemini-2.5-flash-lite' }}
  GENERATION_MODEL: ${{ vars.GENERATION_MODEL || 'gemini-2.5-flash' }}
  DEEP_GENERATION_MODEL: ${{ vars.DEEP_GENERATION_MODEL || 'gemini-2.5-pro' }}
  UTILITY_GENERATION_MODEL: ${{ vars.UTILITY_GENERATION_MODEL || 'gemini-2.5-flash-lite' }}

jobs:
  deploy:
    # When triggered by workflow_run, only proceed if CI succeeded.
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build agent service JAR
        run: |
          mvn -B -DskipTests=false -pl portfolio-agent-service -am package

      - name: Compute image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/agent-v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="sha-$(echo "${GITHUB_SHA}" | cut -c1-7)"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: ${TAG}"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.DEPLOYER_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPO}/${IMAGE_NAME}:${{ steps.tag.outputs.tag }}"
          docker build \
            -f portfolio-agent-service/Dockerfile \
            -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          KNOWLEDGE_SERVICE_BASE_URL="$(gcloud run services describe "${KNOWLEDGE_SERVICE_NAME}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --format='value(status.url)')"
          if [ -z "${KNOWLEDGE_SERVICE_BASE_URL}" ]; then
            echo "Could not resolve ${KNOWLEDGE_SERVICE_NAME} Cloud Run URL."
            exit 1
          fi

          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE}" \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --service-account="${RUNTIME_SA_EMAIL}" \
            --allow-unauthenticated \
            --port=8090 \
            --min-instances=1 \
            --max-instances=2 \
            --concurrency=16 \
            --memory=512Mi \
            --cpu=1 \
            --cpu-throttling \
            --cpu-boost \
            --timeout=120 \
            --set-env-vars="^|^SPRING_PROFILES_ACTIVE=prod|ALLOWED_ORIGINS=${ALLOWED_ORIGINS}|MCP_GATEWAY_BASE_URL=${{ vars.MCP_GATEWAY_BASE_URL }}|KNOWLEDGE_SERVICE_BASE_URL=${KNOWLEDGE_SERVICE_BASE_URL}|SUPABASE_URL=${{ vars.SUPABASE_URL }}|AGENT_ATTACHMENT_BUCKET=${{ vars.AGENT_ATTACHMENT_BUCKET || 'chat-agent-private' }}|AGENT_INTENT_PROVIDER=${{ vars.AGENT_INTENT_PROVIDER }}|OPENAI_INTENT_MODEL=${{ vars.OPENAI_INTENT_MODEL }}|OPENAI_INTENT_ESCALATION_MODEL=${{ vars.OPENAI_INTENT_ESCALATION_MODEL }}|GEMINI_INTENT_MODEL=${GEMINI_INTENT_MODEL}|GEMINI_INTENT_ESCALATION_MODEL=${{ vars.GEMINI_INTENT_ESCALATION_MODEL }}|GEMINI_INTENT_THINKING_BUDGET=0|SAFETY_MODEL=${SAFETY_MODEL}|SAFETY_THINKING_BUDGET=0|GENERATION_MODEL=${GENERATION_MODEL}|DEEP_GENERATION_MODEL=${DEEP_GENERATION_MODEL}|UTILITY_GENERATION_MODEL=${UTILITY_GENERATION_MODEL}|GENERATION_THINKING_BUDGET=0|UTILITY_GENERATION_THINKING_BUDGET=0|AGENT_BUDGET_ENABLED=${{ vars.AGENT_BUDGET_ENABLED }}|AGENT_CHAT_DAILY_BUDGET_USD=${CHAT_DAILY_BUDGET_USD}|AGENT_CHAT_REQUEST_RESERVATION_USD=${{ vars.AGENT_CHAT_REQUEST_RESERVATION_USD || '0.05' }}|AGENT_BUDGET_ZONE=${{ vars.AGENT_BUDGET_ZONE }}" \
            --remove-secrets="AIVEN_PG_PASSWORD" \
            --update-secrets="OPENAI_API_KEY=OPENAI_API_KEY:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,AGENT_SERVICE_INTERNAL_TOKEN=AGENT_SERVICE_INTERNAL_TOKEN:latest,MCP_GATEWAY_INTERNAL_TOKEN=MCP_GATEWAY_INTERNAL_TOKEN:latest,SPRING_DATASOURCE_URL=SPRING_DATASOURCE_URL:latest,SPRING_DATASOURCE_USERNAME=SPRING_DATASOURCE_USERNAME:latest,SPRING_DATASOURCE_PASSWORD=SPRING_DATASOURCE_PASSWORD:latest,SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,REDIS_URL=VALKEY_URL:latest,OPENSEARCH_PASSWORD=OPENSEARCH_PASSWORD:latest"

      - name: Smoke test (wait for ready revision)
        run: |
          for i in $(seq 1 30); do
            LATEST_READY=$(gcloud run services describe "${SERVICE_NAME}" \
              --region="${REGION}" --project="${PROJECT_ID}" \
              --format='value(status.latestReadyRevisionName)')
            LATEST_CREATED=$(gcloud run services describe "${SERVICE_NAME}" \
              --region="${REGION}" --project="${PROJECT_ID}" \
              --format='value(status.latestCreatedRevisionName)')
            echo "ready=${LATEST_READY} created=${LATEST_CREATED}"
            if [ -n "${LATEST_READY}" ] && [ "${LATEST_READY}" = "${LATEST_CREATED}" ]; then
              echo "Revision ${LATEST_READY} is ready."
              exit 0
            fi
            sleep 5
          done
          echo "Latest revision never became ready in time."
          exit 1
