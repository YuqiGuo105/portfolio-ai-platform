server:
  port: ${PORT:8090}
  servlet:
    context-path: /

spring:
  application:
    name: portfolio-agent-service
  main:
    # Force MVC despite WebFlux being on the classpath (we use WebFlux only as
    # a reactive client library for outbound HTTP / SSE consumption).
    web-application-type: servlet
  jackson:
    default-property-inclusion: non_null
  # DataSource is opt-in: excluded by default so the service starts without DB.
  # Enable by removing the exclusion and setting SPRING_DATASOURCE_URL,
  # SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD + FLYWAY_ENABLED=true.
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

agent:
  model:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

  intent:
    # Active LLM provider for intent classification: openai | gemini.
    # Default to gemini — OpenAI quota was exhausted on the production
    # account and Gemini has a free tier sufficient for this workload.
    provider: ${AGENT_INTENT_PROVIDER:gemini}
    openai:
      # Cheap nano/mini classifier — override with OPENAI_INTENT_MODEL.
      model: ${OPENAI_INTENT_MODEL:gpt-4o-mini}
      # Optional stronger model used for borderline confidence.
      escalation-model: ${OPENAI_INTENT_ESCALATION_MODEL:}
      timeout-ms: ${OPENAI_INTENT_TIMEOUT_MS:15000}
    gemini:
      # Cheap Flash classifier — override with GEMINI_INTENT_MODEL.
      model: ${GEMINI_INTENT_MODEL:gemini-2.5-flash}
      escalation-model: ${GEMINI_INTENT_ESCALATION_MODEL:}
      timeout-ms: ${GEMINI_INTENT_TIMEOUT_MS:15000}
      max-output-tokens: ${GEMINI_INTENT_MAX_OUTPUT_TOKENS:1024}
      # 0 disables Gemini-2.5 hidden "thinking" tokens (cheaper + faster).
      thinking-budget: ${GEMINI_INTENT_THINKING_BUDGET:0}
    confidence:
      read-threshold: ${MCP_INTENT_CONFIDENCE_READ_THRESHOLD:0.85}
      clarify-threshold: ${MCP_INTENT_CONFIDENCE_CLARIFY_THRESHOLD:0.65}
    pending-action:
      ttl-seconds: ${MCP_PENDING_ACTION_TTL_S:300}

  sse:
    keep-alive-interval-ms: ${AGENT_SSE_KEEPALIVE_MS:15000}
    timeout-ms: ${AGENT_SSE_TIMEOUT_MS:120000}

  # Fail-closed authentication for /api/intent and /api/chat.
  # See SupabaseJwtAuthFilter for the full rule table. In prod, EITHER
  # supabase-jwt-secret OR internal-token MUST be set — leaving both empty
  # with allow-anonymous=false makes every protected request return 401.
  auth:
    supabase-jwt-secret: ${SUPABASE_JWT_SECRET:}
    internal-token: ${AGENT_SERVICE_INTERNAL_TOKEN:}
    admin-emails: ${ADMIN_ALLOWED_EMAILS:}
    allow-anonymous: ${AGENT_AUTH_ALLOW_ANONYMOUS:false}
    docs-exposed: ${AGENT_AUTH_DOCS_EXPOSED:false}

mcp-gateway:
  base-url: ${MCP_GATEWAY_BASE_URL:http://localhost:8091}
  internal-token: ${MCP_GATEWAY_INTERNAL_TOKEN:}
  timeout-ms: ${MCP_GATEWAY_TIMEOUT_MS:30000}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: portfolio-agent-service

# ─── PostgreSQL (conversation / run / step / outbox) ────────────────────────
spring.datasource:
  url: ${SPRING_DATASOURCE_URL:}
  username: ${SPRING_DATASOURCE_USERNAME:}
  password: ${SPRING_DATASOURCE_PASSWORD:}
  hikari:
    maximum-pool-size: 5

spring.flyway:
  enabled: ${FLYWAY_ENABLED:false}
  locations: classpath:db/migration
  table: agent_flyway_history

# ─── OpenSearch (outbox → log index sync) ────────────────────────────────
observability:
  opensearch:
    url: ${OPENSEARCH_URL:https://os-79250b0-yguo105-17e7.l.aivencloud.com:22949}
    username: ${OPENSEARCH_USERNAME:avnadmin}
    password: ${OPENSEARCH_PASSWORD:}
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}
    batch-size: ${OUTBOX_BATCH_SIZE:100}

# ─── Knowledge Service ───────────────────────────────────────────────────
knowledge:
  base-url: ${KNOWLEDGE_SERVICE_BASE_URL:http://localhost:8092}
  timeout-ms: ${KNOWLEDGE_TIMEOUT_MS:10000}

# ─── Safety + Handoff ────────────────────────────────────────────────────
safety:
  enabled: ${SAFETY_ENABLED:true}
  model: ${SAFETY_MODEL:gemini-2.5-flash}
  # Confidence below this triggers handoff
  handoff-confidence-threshold: ${HANDOFF_CONFIDENCE_THRESHOLD:0.4}
  # Risk levels that force handoff (comma-separated)
  handoff-risk-levels: ${HANDOFF_RISK_LEVELS:CRITICAL,HIGH}

handoff:
  enabled: ${HANDOFF_ENABLED:true}
  # CRM integration endpoint (Zendesk/Salesforce/internal)
  crm-webhook-url: ${CRM_WEBHOOK_URL:}
  crm-api-key: ${CRM_API_KEY:}

# ─── Answer Generation (Gemini Pro) ─────────────────────────────────────
agent.generation:
  model: ${GENERATION_MODEL:gemini-2.5-pro}
  max-output-tokens: ${GENERATION_MAX_OUTPUT_TOKENS:4096}

logging:
  level:
    site.yuqi.agent: INFO

---
# Prod profile: lock down the OpenAPI surface. Anyone who happens to know
# the Cloud Run URL should NOT be able to enumerate the internal API shape.
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
