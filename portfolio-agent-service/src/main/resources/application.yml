server:
  port: ${PORT:8090}
  servlet:
    context-path: /

spring:
  application:
    name: portfolio-agent-service
  main:
    # Force MVC despite WebFlux being on the classpath (we use WebFlux only as
    # a reactive client library for outbound HTTP / SSE consumption).
    web-application-type: servlet
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  codec:
    max-in-memory-size: ${AGENT_HTTP_MAX_IN_MEMORY_SIZE:10MB}

agent:
  model:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

  intent:
    # Active LLM provider for intent classification: openai | gemini.
    # Default to gemini — OpenAI quota was exhausted on the production
    # account and Gemini has a free tier sufficient for this workload.
    provider: ${AGENT_INTENT_PROVIDER:gemini}
    openai:
      # Cheap nano/mini classifier — override with OPENAI_INTENT_MODEL.
      model: ${OPENAI_INTENT_MODEL:gpt-4o-mini}
      # Optional stronger model used for borderline confidence.
      escalation-model: ${OPENAI_INTENT_ESCALATION_MODEL:}
      timeout-ms: ${OPENAI_INTENT_TIMEOUT_MS:15000}
    gemini:
      # Low-latency structured classifier — override with GEMINI_INTENT_MODEL.
      model: ${GEMINI_INTENT_MODEL:gemini-2.5-flash-lite}
      escalation-model: ${GEMINI_INTENT_ESCALATION_MODEL:}
      timeout-ms: ${GEMINI_INTENT_TIMEOUT_MS:15000}
      # Structured tool arguments can be nested; this is a ceiling, not a fixed token spend.
      max-output-tokens: ${GEMINI_INTENT_MAX_OUTPUT_TOKENS:1024}
      # 0 disables Gemini-2.5 hidden "thinking" tokens (cheaper + faster).
      thinking-budget: ${GEMINI_INTENT_THINKING_BUDGET:0}
    confidence:
      read-threshold: ${MCP_INTENT_CONFIDENCE_READ_THRESHOLD:0.85}
      clarify-threshold: ${MCP_INTENT_CONFIDENCE_CLARIFY_THRESHOLD:0.65}
    pending-action:
      ttl-seconds: ${MCP_PENDING_ACTION_TTL_S:300}
      decision-confidence: ${MCP_PENDING_ACTION_DECISION_CONFIDENCE:0.80}

  memory:
    ttl-seconds: ${AGENT_MEMORY_TTL_SECONDS:1800}
    max-turns-before-compact: ${AGENT_MEMORY_MAX_TURNS_BEFORE_COMPACT:10}
    token-budget: ${AGENT_MEMORY_TOKEN_BUDGET:4000}
    idle-compact-ms: ${AGENT_MEMORY_IDLE_COMPACT_MS:600000}
    idle-scan-interval-ms: ${AGENT_MEMORY_IDLE_SCAN_INTERVAL_MS:60000}
    tool-result-max-chars: ${AGENT_MEMORY_TOOL_RESULT_MAX_CHARS:3000}

  attachments:
    # Raw files live only in this private bucket. Redis owns the sliding lease
    # and stores only opaque metadata plus compact parser output.
    supabase-url: ${SUPABASE_URL:}
    service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
    bucket: ${AGENT_ATTACHMENT_BUCKET:chat-agent-private}
    signing-secret: ${ATTACHMENT_SIGNING_SECRET:${AGENT_SERVICE_INTERNAL_TOKEN:}}
    max-files-per-conversation: ${AGENT_ATTACHMENT_MAX_FILES_PER_CONVERSATION:2}
    max-files-per-request: ${AGENT_ATTACHMENT_MAX_FILES_PER_REQUEST:2}
    max-file-bytes: ${AGENT_ATTACHMENT_MAX_FILE_BYTES:5242880}
    max-total-bytes: ${AGENT_ATTACHMENT_MAX_TOTAL_BYTES:8388608}
    max-context-chars: ${AGENT_ATTACHMENT_MAX_CONTEXT_CHARS:6000}
    max-parser-text-chars: ${AGENT_ATTACHMENT_MAX_PARSER_TEXT_CHARS:200000}
    max-uploads-per-hour: ${AGENT_ATTACHMENT_MAX_UPLOADS_PER_HOUR:8}
    max-global-uploads-per-day: ${AGENT_ATTACHMENT_MAX_GLOBAL_UPLOADS_PER_DAY:250}
    upload-url-ttl-seconds: ${AGENT_ATTACHMENT_UPLOAD_URL_TTL_SECONDS:300}
    lease-seconds: ${AGENT_ATTACHMENT_LEASE_SECONDS:${AGENT_MEMORY_TTL_SECONDS:1800}}
    cleanup-record-ttl-seconds: ${AGENT_ATTACHMENT_CLEANUP_RECORD_TTL_SECONDS:86400}
    cleanup-interval-ms: ${AGENT_ATTACHMENT_CLEANUP_INTERVAL_MS:60000}
    storage-timeout-seconds: ${AGENT_ATTACHMENT_STORAGE_TIMEOUT_SECONDS:20}

  budget:
    enabled: ${AGENT_BUDGET_ENABLED:true}
    daily-usd-limit: ${AGENT_CHAT_DAILY_BUDGET_USD:0.75}
    per-request-reservation-usd: ${AGENT_CHAT_REQUEST_RESERVATION_USD:0.05}
    standard-model-estimate-usd: ${AGENT_STANDARD_MODEL_ESTIMATE_USD:0.002}
    deep-model-estimate-usd: ${AGENT_DEEP_MODEL_ESTIMATE_USD:0.04}
    deep-path-enabled: ${AGENT_DEEP_PATH_ENABLED:true}
    deep-path-min-remaining-usd: ${AGENT_DEEP_PATH_MIN_REMAINING_USD:0.10}
    high-cost-disable-at-ratio: ${AGENT_HIGH_COST_DISABLE_AT_RATIO:0.90}
    zone: ${AGENT_BUDGET_ZONE:UTC}

  sse:
    keep-alive-interval-ms: ${AGENT_SSE_KEEPALIVE_MS:15000}
    timeout-ms: ${AGENT_SSE_TIMEOUT_MS:120000}

  # Fail-closed authentication for /api/intent and /api/chat.
  # See SupabaseJwtAuthFilter for the full rule table. In prod, EITHER
  # supabase-jwt-secret OR internal-token MUST be set — leaving both empty
  # with allow-anonymous=false makes every protected request return 401.
  auth:
    supabase-jwt-secret: ${SUPABASE_JWT_SECRET:}
    internal-token: ${AGENT_SERVICE_INTERNAL_TOKEN:}
    admin-emails: ${ADMIN_ALLOWED_EMAILS:}
    allow-anonymous: ${AGENT_AUTH_ALLOW_ANONYMOUS:false}
    docs-exposed: ${AGENT_AUTH_DOCS_EXPOSED:false}

mcp-gateway:
  base-url: ${MCP_GATEWAY_BASE_URL:http://localhost:8091}
  internal-token: ${MCP_GATEWAY_INTERNAL_TOKEN:}
  timeout-ms: ${MCP_GATEWAY_TIMEOUT_MS:30000}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: portfolio-agent-service

# ─── PostgreSQL (conversation / run / step / outbox) ────────────────────────
spring.datasource:
  url: ${SPRING_DATASOURCE_URL:}
  username: ${SPRING_DATASOURCE_USERNAME:}
  password: ${SPRING_DATASOURCE_PASSWORD:}
  hikari:
    maximum-pool-size: 5

spring.flyway:
  enabled: true
  locations: classpath:db/migration
  table: agent_flyway_history
  baseline-on-migrate: true
  baseline-version: 0

# ─── OpenSearch (outbox → log index sync) ────────────────────────────────
observability:
  opensearch:
    url: ${OPENSEARCH_URL:https://os-79250b0-yguo105-17e7.l.aivencloud.com:22949}
    username: ${OPENSEARCH_USERNAME:avnadmin}
    password: ${OPENSEARCH_PASSWORD:}
  outbox:
    poll-interval-ms: ${OUTBOX_POLL_INTERVAL_MS:5000}
    batch-size: ${OUTBOX_BATCH_SIZE:100}
  retention:
    # Days to keep daily indexes before automatic deletion (free-tier shard budget)
    days: ${OBSERVABILITY_RETENTION_DAYS:30}
    # Max shards allowed before emergency cleanup removes oldest indexes
    max-shards: ${OBSERVABILITY_MAX_SHARDS:18}

# ─── Knowledge Service ───────────────────────────────────────────────────
knowledge:
  base-url: ${KNOWLEDGE_SERVICE_BASE_URL:http://localhost:8092}
  # Allows a scale-to-zero Knowledge Service to finish its cold start.
  timeout-ms: ${KNOWLEDGE_TIMEOUT_MS:25000}

# ─── Safety + Handoff ────────────────────────────────────────────────────
safety:
  enabled: ${SAFETY_ENABLED:true}
  model: ${SAFETY_MODEL:gemini-2.5-flash-lite}
  timeout-ms: ${SAFETY_TIMEOUT_MS:10000}
  thinking-budget: ${SAFETY_THINKING_BUDGET:0}
  input:
    # A model-selected BLOCK below this confidence is downgraded to WARN.
    block-confidence-threshold: ${INPUT_SAFETY_BLOCK_CONFIDENCE_THRESHOLD:0.95}
  # Confidence below this triggers handoff
  handoff-confidence-threshold: ${HANDOFF_CONFIDENCE_THRESHOLD:0.4}
  # Risk levels that force handoff (comma-separated)
  handoff-risk-levels: ${HANDOFF_RISK_LEVELS:CRITICAL,HIGH}

handoff:
  enabled: ${HANDOFF_ENABLED:true}
  # CRM integration endpoint (Zendesk/Salesforce/internal)
  crm-webhook-url: ${CRM_WEBHOOK_URL:}
  crm-api-key: ${CRM_API_KEY:}

# ─── Tiered Answer Generation ────────────────────────────────────────────
agent.generation:
  model: ${GENERATION_MODEL:gemini-2.5-flash}
  deep-model: ${DEEP_GENERATION_MODEL:gemini-2.5-pro}
  utility-model: ${UTILITY_GENERATION_MODEL:gemini-2.5-flash-lite}
  max-output-tokens: ${GENERATION_MAX_OUTPUT_TOKENS:2048}
  deep-max-output-tokens: ${DEEP_GENERATION_MAX_OUTPUT_TOKENS:4096}
  utility-max-output-tokens: ${UTILITY_GENERATION_MAX_OUTPUT_TOKENS:1024}
  thinking-budget: ${GENERATION_THINKING_BUDGET:0}
  utility-thinking-budget: ${UTILITY_GENERATION_THINKING_BUDGET:0}

logging:
  level:
    site.yuqi.agent: INFO

---
# Prod profile: lock down the OpenAPI surface. Anyone who happens to know
# the Cloud Run URL should NOT be able to enumerate the internal API shape.
spring:
  config:
    activate:
      on-profile: prod
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
