# Sprint 1 MCP tool catalog.
#
# IMPORTANT: tool names here MUST match site.yuqi.agent.intent.ToolRegistry
# in portfolio-agent-service exactly. The agent calls
#   POST /api/tools/{name}/invoke
# and {name} comes from its own allowlist.
#
# Each entry declares:
#   name              – stable string; agent.intent.ToolDefinition.name
#   mode              – READ | WRITE   (gateway uses this for audit + idempotency)
#   description       – short human-readable summary
#   requiredRole      – VIEWER | EDITOR | PUBLISHER | ADMIN
#   riskLevel         – LOW | MEDIUM | HIGH | CRITICAL  (gateway taxonomy)
#   dryRunSupported   – boolean
#   confirmRequired   – boolean (writes must pass _confirmed=true)
#   confirmationMethod– optional, e.g. "email_otp"
#   parameters        – list of { name, type, required, description }
#   endpoint          – { target, method, path }
#                       target ∈ portfolio | admin | notification
#
# Hard invariants enforced by the gateway:
#   * NEVER writes Supabase tables directly.
#   * NEVER constructs Kafka payloads — admin-service owns event emission for
#     publish / reindex / retry tools.
#   * Every WRITE-mode tool is audited via AuditService and respects the
#     riskLevel / confirmRequired flags.

tools:

  # ── Admin: read ─────────────────────────────────────────────────────────
  - name: admin.search_content
    mode: READ
    description: Search portfolio content (blogs, projects, life blogs, experience).
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: keyword,    type: string,  required: true,  description: "Free-text keyword." }
      - { name: sourceType, type: string,  required: false, description: "BLOG | PROJECT | LIFE | EXPERIENCE." }
      - { name: category,   type: string,  required: false, description: "Category slug filter." }
      - { name: limit,      type: integer, required: false, description: "Default 10, max 50." }
    endpoint:
      target: admin
      method: GET
      path: /api/admin/content

  - name: admin.get_content
    mode: READ
    description: Fetch a single content item by sourceType + sourceId.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: sourceType, type: string,  required: true,  description: "BLOG | PROJECT | LIFE | EXPERIENCE." }
      - { name: sourceId,   type: integer, required: true,  description: "Content id." }
    endpoint:
      target: admin
      method: GET
      path: /api/admin/content/{sourceType}/{sourceId}

  - name: admin.list_indexing_jobs
    mode: READ
    description: List indexing jobs (RAG / OpenSearch) with optional status filter.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: status, type: string,  required: false, description: "PENDING | RUNNING | FAILED | SUCCEEDED." }
      - { name: kind,   type: string,  required: false, description: "RAG | SEARCH." }
      - { name: limit,  type: integer, required: false }
    endpoint:
      target: admin
      method: GET
      path: /api/admin/indexing-jobs

  - name: admin.list_outbox_events
    mode: READ
    description: List recent outbox events awaiting or after Kafka emission.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: status, type: string,  required: false, description: "PENDING | SENT | FAILED." }
      - { name: limit,  type: integer, required: false }
    endpoint:
      target: admin
      method: GET
      path: /api/admin/outbox

  # ── Analytics: privacy-safe aggregate reads ────────────────────────────
  - name: analytics.get_visitor_summary
    mode: READ
    description: Get aggregate visitor metrics for a confirmed time range. Never returns individual visitor details.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    note: |
      Privacy invariants:
        * startDate/endDate must cover at least 7 days.
        * caller must set _confirmedTimeRange=true after user approval.
        * gateway strips raw visitor identifiers and suppresses tiny buckets.
        * adapter translates startDate/endDate to a days window and calls the
          public analytics summary endpoint; no admin path is required.
    parameters:
      - { name: startDate, type: string, required: true, description: "ISO date, inclusive." }
      - { name: endDate,   type: string, required: true, description: "ISO date, inclusive. Minimum range is 7 days." }
      - { name: granularity, type: string, required: false, description: "week | month." }
      - { name: dimensions, type: array, required: false, description: "Aggregate-only breakdowns, for example country, deviceCategory." }
    endpoint:
      target: analytics
      method: GET
      path: /api/public/visits/summary

  - name: analytics.get_top_pages
    mode: READ
    description: Get top pages by aggregate visits for a confirmed time range.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: startDate, type: string, required: true, description: "ISO date, inclusive." }
      - { name: endDate,   type: string, required: true, description: "ISO date, inclusive. Minimum range is 7 days." }
      - { name: limit,     type: integer, required: false, description: "Default 10, max 25." }
    endpoint:
      target: analytics
      method: GET
      path: /api/public/visits/summary

  - name: analytics.get_referrer_summary
    mode: READ
    description: Get aggregate traffic source/referrer summary for a confirmed time range.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: startDate, type: string, required: true, description: "ISO date, inclusive." }
      - { name: endDate,   type: string, required: true, description: "ISO date, inclusive. Minimum range is 7 days." }
    endpoint:
      target: analytics
      method: GET
      path: /api/public/visits/summary

  # ── Admin: write ────────────────────────────────────────────────────────
  - name: admin.create_content_draft
    mode: WRITE
    description: Create a new content draft (no publish, no events emitted).
    requiredRole: EDITOR
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: true
    parameters:
      - { name: sourceType, type: string, required: true,  description: "BLOG | PROJECT | LIFE | EXPERIENCE." }
      - { name: title,      type: string, required: true }
      - { name: summary,    type: string, required: false }
      - { name: body,       type: string, required: false }
      - { name: category,   type: string, required: false }
      - { name: tags,       type: array,  required: false }
    endpoint:
      target: admin
      method: POST
      path: /api/admin/content/{sourceType}/drafts

  - name: admin.update_content
    mode: WRITE
    description: Update fields on an existing draft or published content item.
    requiredRole: EDITOR
    riskLevel: MEDIUM
    dryRunSupported: false
    confirmRequired: true
    parameters:
      - { name: sourceType, type: string,  required: true }
      - { name: sourceId,   type: integer, required: true }
      - { name: title,      type: string,  required: false }
      - { name: summary,    type: string,  required: false }
      - { name: body,       type: string,  required: false }
      - { name: category,   type: string,  required: false }
      - { name: tags,       type: array,   required: false }
      - { name: changeNote, type: string,  required: false }
    endpoint:
      target: admin
      method: PATCH
      path: /api/admin/content/{sourceType}/{sourceId}

  - name: admin.publish_content
    mode: WRITE
    description: Publish a content item. admin-service emits content.published.
    requiredRole: PUBLISHER
    riskLevel: HIGH
    dryRunSupported: false
    confirmRequired: true
    note: |
      The gateway forwards sourceType + sourceId only. portfolio-admin-service
      assembles the Kafka payload (content.published). The gateway MUST NOT
      construct Kafka envelopes itself.
    parameters:
      - { name: sourceType, type: string,  required: true }
      - { name: sourceId,   type: integer, required: true }
      - { name: changeNote, type: string,  required: false }
    endpoint:
      target: admin
      method: POST
      path: /api/admin/content/{sourceType}/{sourceId}/publish

  - name: admin.reindex_rag
    mode: WRITE
    description: Reindex a content item into the RAG vector store.
    requiredRole: PUBLISHER
    riskLevel: HIGH
    dryRunSupported: true
    confirmRequired: true
    parameters:
      - { name: sourceType, type: string,  required: true }
      - { name: sourceId,   type: integer, required: true }
      - { name: dryRun,     type: boolean, required: false }
    endpoint:
      target: admin
      method: POST
      path: /api/admin/content/{sourceType}/{sourceId}/reindex-rag

  - name: admin.reindex_search
    mode: WRITE
    description: Reindex a content item into OpenSearch.
    requiredRole: PUBLISHER
    riskLevel: HIGH
    dryRunSupported: true
    confirmRequired: true
    parameters:
      - { name: sourceType, type: string,  required: true }
      - { name: sourceId,   type: integer, required: true }
      - { name: dryRun,     type: boolean, required: false }
    endpoint:
      target: admin
      method: POST
      path: /api/admin/content/{sourceType}/{sourceId}/reindex-search

  - name: admin.retry_indexing_job
    mode: WRITE
    description: Retry a failed indexing job by jobId.
    requiredRole: ADMIN
    riskLevel: MEDIUM
    dryRunSupported: false
    confirmRequired: true
    parameters:
      - { name: jobId, type: string, required: true, description: "Indexing job id." }
    endpoint:
      target: admin
      method: POST
      path: /api/admin/indexing-jobs/{jobId}/retry

  # ── Notification: read ──────────────────────────────────────────────────
  - name: notification.get_delivery_stats
    mode: READ
    description: Aggregated notification delivery stats.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: window,  type: string, required: false, description: "1h | 24h | 7d." }
      - { name: channel, type: string, required: false, description: "EMAIL | WEB." }
    endpoint:
      target: notification
      method: GET
      path: /api/admin/notifications/stats

  - name: notification.list_subscribers
    mode: READ
    description: List newsletter subscribers (admin-only).
    requiredRole: ADMIN
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: status,   type: string,  required: false }
      - { name: category, type: string,  required: false }
      - { name: limit,    type: integer, required: false }
      - { name: cursor,   type: string,  required: false }
    endpoint:
      target: notification
      method: GET
      path: /api/admin/subscribers

  - name: notification.get_subscriber
    mode: READ
    description: Get a subscriber by id (admin-only).
    requiredRole: ADMIN
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: subscriberId, type: string, required: true }
    endpoint:
      target: notification
      method: GET
      path: /api/admin/subscribers/{subscriberId}

  - name: notification.list_notifications
    mode: READ
    description: List sent / scheduled notifications.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: status,  type: string,  required: false }
      - { name: channel, type: string,  required: false }
      - { name: limit,   type: integer, required: false }
    endpoint:
      target: notification
      method: GET
      path: /api/admin/notifications

  - name: notification.list_failed_deliveries
    mode: READ
    description: List failed or pending notification deliveries.
    requiredRole: VIEWER
    riskLevel: LOW
    dryRunSupported: false
    confirmRequired: false
    parameters:
      - { name: channel, type: string,  required: false, description: "EMAIL | WEB." }
      - { name: status,  type: string,  required: false, description: "FAILED | PENDING." }
      - { name: limit,   type: integer, required: false }
    endpoint:
      target: notification
      method: GET
      path: /api/admin/notifications/deliveries

  # ── Notification: write ─────────────────────────────────────────────────
  - name: notification.retry_failed_delivery
    mode: WRITE
    description: Retry a failed notification delivery by recipientId.
    requiredRole: ADMIN
    riskLevel: MEDIUM
    dryRunSupported: false
    confirmRequired: true
    parameters:
      - { name: recipientId, type: string, required: true }
    endpoint:
      target: notification
      method: POST
      path: /api/admin/notifications/deliveries/{recipientId}/retry

  - name: notification.send_test_notification
    mode: WRITE
    description: Send a test notification to a recipient.
    requiredRole: ADMIN
    riskLevel: MEDIUM
    dryRunSupported: true
    confirmRequired: true
    parameters:
      - { name: recipient,  type: string, required: true,  description: "Email or subscriberId." }
      - { name: channel,    type: string, required: false, description: "EMAIL | WEB." }
      - { name: templateId, type: string, required: false }
    endpoint:
      target: notification
      method: POST
      path: /api/admin/notifications/test

  - name: notification.update_subscription
    mode: WRITE
    description: Update subscriber preferences.
    requiredRole: ADMIN
    riskLevel: MEDIUM
    dryRunSupported: false
    confirmRequired: true
    parameters:
      - { name: subscriberId, type: string, required: true }
      - { name: categories,   type: array,  required: false }
      - { name: frequency,    type: string, required: false }
    endpoint:
      target: notification
      method: PATCH
      path: /api/admin/subscribers/{subscriberId}/preferences

  - name: subscription.request_unsubscribe_code
    mode: WRITE
    description: Send a short-lived email verification code before unsubscribing an address.
    requiredRole: VIEWER
    riskLevel: HIGH
    dryRunSupported: false
    confirmRequired: true
    note: |
      This public, narrowly scoped tool is the first leg of the unsubscribe
      workflow. Its response never reveals whether the email is subscribed.
    parameters:
      - { name: email, type: string, required: true }
    endpoint:
      target: notification
      method: POST
      path: /api/subscriptions/unsubscribe-verification

  - name: subscription.confirm_unsubscribe
    mode: WRITE
    description: Verify the emailed code and change subscription status to UNSUBSCRIBED. Never deletes subscriber data.
    requiredRole: VIEWER
    riskLevel: HIGH
    dryRunSupported: false
    confirmRequired: false
    confirmationMethod: email_otp
    parameters:
      - { name: verificationId,   type: string, required: true }
      - { name: verificationCode, type: string, required: true, description: "6-digit code from the subscriber email verification flow." }
    endpoint:
      target: notification
      method: POST
      path: /api/subscriptions/unsubscribe/confirm
