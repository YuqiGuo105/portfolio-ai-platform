# Local dev compose. Both services run as stateless Spring Boot apps.
# Supabase / OpenAI / Gemini credentials are read from a sibling `.env` file
# (NOT committed — see README.md for the full env list).

services:
  portfolio-agent-service:
    build:
      context: .
      dockerfile: portfolio-agent-service/Dockerfile
    image: portfolio-agent-service:local
    container_name: portfolio-agent-service
    ports:
      - "8090:8090"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - PORT=8090
      - MCP_GATEWAY_BASE_URL=http://portfolio-mcp-gateway:8091
      - MCP_GATEWAY_INTERNAL_TOKEN=${MCP_GATEWAY_INTERNAL_TOKEN:-dev-internal-token}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - AGENT_MODEL_DEFAULT=${AGENT_MODEL_DEFAULT:-openai}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - portfolio-mcp-gateway
    restart: unless-stopped

  portfolio-mcp-gateway:
    build:
      context: .
      dockerfile: portfolio-mcp-gateway/Dockerfile
    image: portfolio-mcp-gateway:local
    container_name: portfolio-mcp-gateway
    ports:
      - "8091:8091"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - PORT=8091
      - MCP_GATEWAY_INTERNAL_TOKEN=${MCP_GATEWAY_INTERNAL_TOKEN:-dev-internal-token}
      # Domain service base URLs — point local dev at hosted services unless
      # you also have them running locally.
      - PORTFOLIO_BASE_URL=${PORTFOLIO_BASE_URL:-https://www.yuqi.site}
      - ADMIN_SERVICE_BASE_URL=${ADMIN_SERVICE_BASE_URL:-https://portfolio-admin-service-y45c2mnbja-uc.a.run.app}
      - NOTIFICATION_SERVICE_BASE_URL=${NOTIFICATION_SERVICE_BASE_URL:-http://localhost:8082}
      - NOTIFICATION_INTERNAL_TOKEN=${NOTIFICATION_INTERNAL_TOKEN:-}
      # Supabase: wired in but Flyway disabled; child services don't manage
      # any schema in Sprint 1.
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET:-}
      - ADMIN_ALLOWED_EMAILS=${ADMIN_ALLOWED_EMAILS:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
